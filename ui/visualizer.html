<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3.js Scatterplot with Slider</title>
    <style>
        body {
            background-color: black;
            color: white;
        }
        #scatterplot {
            display: block;
            margin: auto;
        }
        .slider-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }
        .slider {
            width: 300px;
        }

        .hover-info {
  background-color: rgba(255, 255, 255, 0.8);  /* Semi-transparent white */
  padding: 5px;
  border-radius: 5px;
  font-size: 0.8em;
}

    </style>
</head>
<body>
    <svg id="scatterplot" width="1800" height="800"></svg>
    <div class="slider-container">
        <input type="range" min="1" max="1000" value="100" class="slider" id="pointSlider">
    </div>

    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="scatterplot.js"></script>
</body>
</html>
