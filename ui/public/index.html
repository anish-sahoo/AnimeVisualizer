<!doctype html>
<html lang="en">
  <head>
    <title>Anime Visualizer</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/5.3.3/pixi.min.js"></script>
  </head>
  <body>
    <div class="pane">
      <label for="pointSlider" id="numPoints">Number of Anime Displayed: 1000</label
      ><input type="range" id="pointSlider" min="1" max="1000" value="1000" />
      <button id="selectAllButton">Select All</button>
      <button id="deselectAllButton">Deselect All</button>
      <ul id="genresList"></ul>
    </div>
    <script type="module" src="/script.js"></script>
    <script type="module" src="/utils.js"></script>
  </body>
</html>
